<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>아침 브리핑</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #0a0a0f; --bg2: #12121a; --bg3: #1a1a26;
  --border: rgba(255,255,255,0.08);
  --text: #f0f0f5; --text2: #9090a8; --text3: #5a5a72;
  --accent: #7c6ff7; --accent2: #4fc3f7;
  --green: #4ade80; --red: #f87171; --amber: #fbbf24;
}
body { background: var(--bg); color: var(--text); font-family: -apple-system, 'Apple SD Gothic Neo', sans-serif; min-height: 100vh; padding-bottom: 40px; }
.header { padding: 56px 20px 24px; position: sticky; top: 0; z-index: 10; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); background: rgba(10,10,15,0.9); }
.header-row { display: flex; justify-content: space-between; align-items: flex-start; }
.time-display { font-size: 13px; color: var(--text2); letter-spacing: 0.05em; }
.greeting { font-size: 22px; font-weight: 700; margin-top: 4px; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text3); margin-top: 6px; transition: background 0.3s; }
.dot.loading { background: var(--amber); animation: pulse 1s infinite; }
.dot.done { background: var(--green); }
.dot.error { background: var(--red); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

.btn-main { width: calc(100% - 40px); margin: 0 20px 16px; padding: 18px; background: var(--accent); border: none; border-radius: 16px; color: #fff; font-size: 17px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; -webkit-appearance: none; letter-spacing: -0.02em; }
.btn-main:active { opacity: 0.8; transform: scale(0.97); }
.btn-main:disabled { opacity: 0.5; }
.btn-sub { width: calc(100% - 40px); margin: 0 20px 16px; padding: 14px; background: transparent; border: 1px solid var(--accent); border-radius: 12px; color: var(--accent); font-size: 15px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; -webkit-appearance: none; }
.btn-sub.speaking { color: var(--red); border-color: var(--red); }

.card { margin: 0 20px 16px; background: var(--bg2); border-radius: 16px; border: 1px solid var(--border); overflow: hidden; }
.card-header { padding: 14px 16px 10px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
.card-icon { font-size: 15px; width: 28px; height: 28px; background: var(--bg3); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
.card-title { font-size: 12px; font-weight: 700; color: var(--text2); letter-spacing: 0.08em; text-transform: uppercase; }
.card-body { padding: 14px 16px; }

.skeleton { height: 14px; background: var(--bg3); border-radius: 6px; margin-bottom: 10px; animation: shimmer 1.5s infinite; }
.skeleton.w80 { width: 80%; } .skeleton.w60 { width: 60%; }
@keyframes shimmer { 0%,100%{opacity:0.4} 50%{opacity:0.8} }

/* 날씨 */
.w-main { display: flex; align-items: center; gap: 16px; margin-bottom: 14px; }
.w-icon { font-size: 52px; line-height: 1; }
.w-temp { font-size: 44px; font-weight: 700; letter-spacing: -0.03em; line-height: 1; }
.w-desc { font-size: 14px; color: var(--text2); margin-top: 4px; }
.w-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
.w-cell { background: var(--bg3); border-radius: 10px; padding: 10px; text-align: center; }
.w-label { font-size: 11px; color: var(--text3); margin-bottom: 4px; }
.w-val { font-size: 15px; font-weight: 600; }
.outfit-box { background: var(--bg3); border-radius: 12px; padding: 13px 14px; font-size: 14px; line-height: 1.8; color: var(--text2); margin-bottom: 10px; }
.outfit-box strong { color: var(--text); }

/* 자전거 판정 */
.bike-box { border-radius: 12px; padding: 14px 16px; font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
.bike-box.ok     { background: rgba(74,222,128,0.1);  color: var(--green);  border: 1px solid rgba(74,222,128,0.3); }
.bike-box.caution{ background: rgba(251,191,36,0.1);  color: var(--amber);  border: 1px solid rgba(251,191,36,0.3); }
.bike-box.ng     { background: rgba(248,113,113,0.1); color: var(--red);    border: 1px solid rgba(248,113,113,0.3); }

/* 주식 */
.stock-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
.stock-row:last-child { border-bottom: none; }
.s-name { font-size: 14px; font-weight: 600; }
.s-ticker { font-size: 11px; color: var(--text3); margin-top: 2px; }
.s-right { text-align: right; }
.s-price { font-size: 15px; font-weight: 600; }
.s-change { font-size: 12px; margin-top: 2px; }
.up { color: var(--green); } .dn { color: var(--red); }
.summary-box { background: var(--bg3); border-radius: 12px; padding: 13px 14px; font-size: 13px; line-height: 1.7; color: var(--text2); margin-top: 12px; }

/* 뉴스 */
.news-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
.news-item:last-child { border-bottom: none; }
.news-cat { font-size: 11px; color: var(--accent2); font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 4px; }
.news-title { font-size: 14px; font-weight: 600; line-height: 1.5; margin-bottom: 4px; }
.news-desc { font-size: 13px; color: var(--text2); line-height: 1.6; }
.err { color: var(--red); font-size: 14px; text-align: center; padding: 16px 0; }
</style>
</head>
<body>

<div class="header">
  <div class="header-row">
    <div>
      <div class="time-display" id="timeEl"></div>
      <div class="greeting" id="greetEl">좋은 아침입니다 ☀️</div>
    </div>
    <div class="dot" id="dot"></div>
  </div>
</div>

<button class="btn-main" id="btnStart" onclick="startBriefing()">🚴 오늘 브리핑 시작</button>
<button class="btn-sub" id="btnSpeak" onclick="toggleSpeak()" style="display:none">🔊 음성으로 듣기</button>

<div class="card" id="cardWeather" style="display:none">
  <div class="card-header"><div class="card-icon">🌤</div><span class="card-title">날씨 & 자전거 출근</span></div>
  <div class="card-body" id="bodyWeather"></div>
</div>

<div class="card" id="cardStock" style="display:none">
  <div class="card-header"><div class="card-icon">📈</div><span class="card-title">미국 주식 / 전일 마감</span></div>
  <div class="card-body" id="bodyStock"></div>
</div>

<div class="card" id="cardNews" style="display:none">
  <div class="card-header"><div class="card-icon">🌍</div><span class="card-title">오늘의 주요 뉴스</span></div>
  <div class="card-body" id="bodyNews"></div>
</div>

<script>
const LAT = '37.5665', LON = '126.9780';
let ttsText = '', speaking = false;

function tick() {
  const now = new Date();
  const days = ['일','월','화','수','목','금','토'];
  document.getElementById('timeEl').textContent =
    `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 ${days[now.getDay()]}요일  ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
  const h = now.getHours();
  document.getElementById('greetEl').textContent =
    h < 6 ? '새벽 출근이시네요' : h < 10 ? '좋은 아침입니다 ☀️' : h < 14 ? '좋은 오전입니다' : '안녕하세요';
}
tick(); setInterval(tick, 30000);

function setDot(s) { document.getElementById('dot').className = 'dot ' + s; }

function skeleton(id) {
  document.getElementById(id).innerHTML =
    '<div class="skeleton"></div><div class="skeleton w80"></div><div class="skeleton w60"></div>';
}

function wIcon(id) {
  if (id>=200&&id<300) return '⛈';
  if (id>=300&&id<400) return '🌧';
  if (id>=500&&id<510) return id===500 ? '🌦' : '🌧';
  if (id>=510&&id<600) return '🌨';
  if (id>=600&&id<700) return '❄️';
  if (id>=700&&id<800) return '🌫';
  if (id===800) return '☀️';
  if (id===801) return '🌤';
  if (id===802) return '⛅';
  return '☁️';
}

function bikeJudge(w) {
  if (w.isRain || w.rain > 2)
    return { cls:'ng', icon:'🚫', msg:'자전거 출근 불가 — 비가 옵니다' };
  if (w.wind > 10)
    return { cls:'ng', icon:'🚫', msg:'자전거 출근 불가 — 강풍 위험' };
  if (w.rain > 0 || w.wind > 7 || w.humidity > 90)
    return { cls:'caution', icon:'⚠️', msg:'자전거 출근 주의 — 컨디션 확인 후 결정' };
  return { cls:'ok', icon:'✅', msg:'자전거 출근 가능 — 오늘 컨디션 좋습니다' };
}

function outfit(temp) {
  if (temp <= 0)  return '패딩, 내복, 두꺼운 장갑';
  if (temp <= 5)  return '패딩 + 장갑';
  if (temp <= 10) return '윈드브레이커 + 긴팔 레이어';
  if (temp <= 15) return '얇은 자켓 또는 긴팔';
  if (temp <= 20) return '긴팔 + 얇은 바람막이';
  if (temp <= 25) return '반팔 또는 얇은 긴팔';
  return '반팔, 자외선 차단 필수';
}

async function startBriefing() {
  const btn = document.getElementById('btnStart');
  btn.disabled = true; btn.textContent = '브리핑 준비 중...';
  setDot('loading');

  ['cardWeather','cardStock','cardNews'].forEach(id => {
    document.getElementById(id).style.display = 'block';
  });
  skeleton('bodyWeather'); skeleton('bodyStock'); skeleton('bodyNews');

  const [wRes, sRes, nRes] = await Promise.allSettled([
    fetch('/api/weather?lat='+LAT+'&lon='+LON).then(r=>r.json()),
    fetch('/api/stocks').then(r=>r.json()),
    fetch('/api/news').then(r=>r.json())
  ]);

  // 날씨
  let W = null;
  if (wRes.status==='fulfilled' && wRes.value?.list) {
    const c = wRes.value.list[0];
    W = {
      temp: Math.round(c.main.temp),
      feels: Math.round(c.main.feels_like),
      humidity: c.main.humidity,
      wind: parseFloat(c.wind.speed.toFixed(1)),
      desc: c.weather[0].description,
      icon: wIcon(c.weather[0].id),
      rain: c.rain ? (c.rain['3h']||0) : 0,
      isRain: c.weather[0].id >= 200 && c.weather[0].id < 700
    };
  }
  renderWeather(W);

  // 주식
  if (sRes.status==='fulfilled' && !sRes.value.error) renderStock(sRes.value);
  else document.getElementById('bodyStock').innerHTML = '<p class="err">주식 정보를 불러오지 못했습니다</p>';

  // 뉴스
  if (nRes.status==='fulfilled' && Array.isArray(nRes.value)) renderNews(nRes.value);
  else document.getElementById('bodyNews').innerHTML = '<p class="err">뉴스를 불러오지 못했습니다</p>';

  buildTTS(W, sRes, nRes);
  document.getElementById('btnSpeak').style.display = 'flex';
  btn.textContent = '🔄 다시 브리핑'; btn.disabled = false;
  setDot('done');
}

function renderWeather(W) {
  const el = document.getElementById('bodyWeather');
  if (!W) { el.innerHTML = '<p class="err">날씨 정보를 불러오지 못했습니다</p>'; return; }
  const bike = bikeJudge(W);
  const clothes = outfit(W.temp);
  const rainExtra = W.isRain ? '🌧 비 예보 — <strong>우비</strong> 꼭 챙기세요' :
    W.wind > 7 ? '💨 강풍 주의 — 방풍 레이어 추천' :
    W.humidity > 80 ? '💧 습도 높음 — 흡습 소재 추천' : '😊 쾌적한 날씨입니다';

  el.innerHTML = `
    <div class="w-main">
      <div class="w-icon">${W.icon}</div>
      <div>
        <div class="w-temp">${W.temp}°</div>
        <div class="w-desc">${W.desc} · 체감 ${W.feels}°</div>
      </div>
    </div>
    <div class="w-grid">
      <div class="w-cell"><div class="w-label">습도</div><div class="w-val">${W.humidity}%</div></div>
      <div class="w-cell"><div class="w-label">풍속</div><div class="w-val">${W.wind}㎧</div></div>
      <div class="w-cell"><div class="w-label">강수</div><div class="w-val">${W.rain > 0 ? W.rain.toFixed(1)+'㎜' : '없음'}</div></div>
    </div>
    <div class="outfit-box">
      👔 <strong>옷차림</strong> — ${clothes}<br>${rainExtra}
    </div>
    <div class="bike-box ${bike.cls}">${bike.icon} ${bike.msg}</div>
  `;
}

function renderStock(d) {
  const all = [...(d.indices||[]), ...(d.stocks||[])];
  let html = all.map(s => `
    <div class="stock-row">
      <div><div class="s-name">${s.name}</div><div class="s-ticker">${s.ticker}</div></div>
      <div class="s-right">
        <div class="s-price">${s.price}</div>
        <div class="s-change ${s.direction==='up'?'up':'dn'}">${s.change}</div>
      </div>
    </div>`).join('');
  if (d.summary) html += `<div class="summary-box">${d.summary}</div>`;
  document.getElementById('bodyStock').innerHTML = html;
}

function renderNews(news) {
  document.getElementById('bodyNews').innerHTML = news.map(n => `
    <div class="news-item">
      <div class="news-cat">${n.category}</div>
      <div class="news-title">${n.title}</div>
      <div class="news-desc">${n.summary}</div>
    </div>`).join('');
}

function buildTTS(W, sRes, nRes) {
  const now = new Date();
  const days = ['일','월','화','수','목','금','토'];
  let t = `${now.getMonth()+1}월 ${now.getDate()}일 ${days[now.getDay()]}요일 아침 브리핑입니다.\n\n`;
  if (W) {
    const bike = bikeJudge(W);
    t += `오늘 서울 날씨는 기온 ${W.temp}도, 체감 ${W.feels}도, ${W.desc}입니다. 습도 ${W.humidity}퍼센트, 풍속 초속 ${W.wind}미터. `;
    t += `자전거 출근 옷차림으로 ${outfit(W.temp)}을 추천드립니다. ${bike.msg}.\n\n`;
  }
  if (sRes.status==='fulfilled' && sRes.value?.summary) {
    t += `미국 주식 현황. ${sRes.value.summary}\n\n`;
  }
  if (nRes.status==='fulfilled' && Array.isArray(nRes.value)) {
    t += '오늘의 주요 뉴스입니다. ';
    nRes.value.forEach((n,i) => { t += `${i+1}번, ${n.category}. ${n.title}. ${n.summary} `; });
  }
  ttsText = t;
}

function toggleSpeak() {
  const btn = document.getElementById('btnSpeak');
  if (speaking) {
    window.speechSynthesis.cancel();
    speaking = false;
    btn.textContent = '🔊 음성으로 듣기';
    btn.classList.remove('speaking');
    return;
  }
  const u = new SpeechSynthesisUtterance(ttsText);
  u.lang = 'ko-KR'; u.rate = 0.95;
  const v = window.speechSynthesis.getVoices().find(v => v.lang.startsWith('ko'));
  if (v) u.voice = v;
  u.onend = u.onerror = () => {
    speaking = false;
    btn.textContent = '🔊 음성으로 듣기';
    btn.classList.remove('speaking');
  };
  window.speechSynthesis.speak(u);
  speaking = true;
  btn.textContent = '⏹ 음성 중지';
  btn.classList.add('speaking');
}
window.speechSynthesis.onvoiceschanged = () => {};
</script>
</body>
</html>
